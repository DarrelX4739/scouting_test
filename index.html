<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project CLUTCH</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>PROJECT CLUTCH</h1>

        <form id="scoutingForm">

            <input
                type="text"
                id="teamNumber"
                placeholder="Team Number"
                required
            >

            <input
                type="number"
                id="matchNumber"
                placeholder="Match Number"
                required
            >

            <input
                type="text"
                id="scouterInitials"
                placeholder="Scouter Initials"
                required
            >

            <textarea
                id="notes"
                placeholder="Notes"
            ></textarea>

            <button type="submit">
                Save Scout Data
            </button>

        </form>

        <p id="status">
            Ready
        </p>

    </div>

    <script type="module" src="js/app.js"></script>

</body>
</html>
